<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamiczny Quiz: Transformacje Geometryczne</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }
        .quiz-container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .question {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        .question h3 {
            font-size: 1.1em;
            margin-bottom: 10px;
        }
        .options label {
            display: block;
            margin-bottom: 8px;
            cursor: pointer;
            padding: 5px;
            border-radius: 4px;
            transition: background 0.3s;
        }
        .options label:hover {
            background-color: #f0f0f0;
        }
        input[type="radio"] {
            margin-right: 10px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #3498db;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 1.1em;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }
        .btn:hover {
            background-color: #2980b9;
        }
        .btn-reload {
            background-color: #7f8c8d;
            margin-top: 10px;
        }
        .btn-reload:hover {
            background-color: #95a5a6;
        }
        #result {
            margin-top: 20px;
            font-size: 1.2em;
            font-weight: bold;
            text-align: center;
        }
        .correct {
            color: #27ae60;
        }
        .incorrect {
            color: #e74c3c;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>Quiz: Transformacje i Grafika 3D</h1>
    <form id="quizForm"></form>
    <div id="result"></div>
</div>

<script>
    // Baza pytań i odpowiedzi
    const quizData = [
        {
            question: "W jakiej kolejności transformacji przeprowadzamy obrót punktu względem dowolnie wybranego innego punktu w przestrzeni 3D?",
            options: [
                { text: "stworzenie układu lokalnego współrzędnych o początku w środku obrotu, obrót zasadniczy i transformacje odwrotne", correct: false },
                { text: "stworzenie układu lokalnego współrzędnych o początku w środku obrotu, stworzenie drugiego lokalnego nakładającego odpowiednie osie, obrót zasadniczy i transformacje odwrotne", correct: true },
                { text: "wystarczy jedynie obrót", correct: false }
            ]
        },
        {
            question: "Macierz projekcji prostokątnej na płaszczyznę yz:",
            options: [
                { text: "ma wartość „-1” w pozycji 1,1 macierzy (wiersz kolumna)", correct: false },
                { text: "ma wartość „0” w pozycji 1,1 macierzy (wiersz kolumna)", correct: true },
                { text: "ma wartość „1” w pozycji 3,1 macierzy (wiersz kolumna)", correct: false }
            ]
        },
        {
            question: "W projekcji aksonometrycznej izometrycznej współczynnik skrótu względem osi wynosi:",
            options: [
                { text: "dla wszystkich osi 0.82", correct: true },
                { text: "dla osi x 0.47, osi y 0.94, osi z 0.94", correct: false },
                { text: "dla wszystkich osi 0.47", correct: false }
            ]
        },
        {
            question: "Macierz odbicia w płaszczyźnie y-z to macierz która:",
            options: [
                { text: "ma wartość „-1” w pozycji 1,1 macierzy (wiersz kolumna)", correct: true },
                { text: "ma wartość „-1” w pozycji 2,2 macierzy (wiersz kolumna)", correct: false },
                { text: "ma wartość „-1” w pozycji 3,1 macierzy (wiersz kolumna)", correct: false }
            ]
        },
        {
            question: "Jaki warunek musi być spełniony aby skalowanie było skalowaniem równomiernym:",
            options: [
                { text: "wszystkie liczby na diagonali musza być takie same", correct: false },
                { text: "na diagonali muszą znajdować się zera", correct: false },
                { text: "wszystkie współczynniki skalowania na diagonali musza być takie same", correct: true }
            ]
        },
        {
            question: "W rzutowaniu perspektywicznym wszystkie promienie kształtujące rzut są do siebie:",
            options: [
                { text: "równoległe", correct: false },
                { text: "prostopadłe", correct: false },
                { text: "leżą pod różnym kątem w stosunku do środka rzutowania", correct: true }
            ]
        },
        {
            question: "Oblicz położenie po transformacji wierzchołków prostokąta A(3,0); B(6,0); C(3,2); D(6,2). Zastosuj przesunięcie o wektor [3,0].",
            options: [
                { text: "A (6,0) B (9,0) C (6,2) D (9,2)", correct: true },
                { text: "A (0,3) B (0,6) C (-2,3) D (-2,6)", correct: false },
                { text: "A(3,0); B(6,0); C(3,2); D(6,2)", correct: false }
            ]
        },
        {
            question: "Oblicz położenie po transformacji wierzchołków trójkąta A(1,1); B(4,2); C(1,3). Zastosuj odbicie względem osi X.",
            options: [
                { text: "A (-1,-1) B (-4,-2) C (-1,-3)", correct: false },
                { text: "A (-1,1) B (-4,2) C (-1,3)", correct: false },
                { text: "A (1,-1) B (4,-2) C (1,-3)", correct: true }
            ]
        },
        {
            question: "Oblicz położenie po transformacji wierzchołków prostokąta A(3,0); B(6,0); C(3,2); D(6,2). Zastosuj obrót względem środka układu współrzędnych o kąt 90 stopni odwrotnie do ruchu wskazówek zegara.",
            options: [
                { text: "A (0,-3) B (0,-6) C (2,-3) D (2,-6)", correct: false },
                { text: "A (0,3) B (0,6) C (-2,3) D (-2,6)", correct: true },
                { text: "A(-3,0); B(-6,0); C(-3,2); D(-6,2)", correct: false },
                { text: "A(-3,0); B(-6,0); C(-3,-2); D(-6,-2)", correct: false }
            ]
        },
        {
            question: "Czy dla transformacji geometrycznej (nie deformacji) każdy punkt ma swoją jedyną reprezentację w zbiorze przekształconym oraz wszystkie punkty w zbiorze przekształconym mają swoją reprezentację w zbiorze pierwotnym? Czy zawsze możliwe jest przekształcenie odwrotne?",
            options: [
                { text: "tak", correct: true },
                { text: "nie", correct: false }
            ]
        }
    ];

    // Funkcja do tasowania tablicy (algorytm Fishera-Yatesa)
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    // Funkcja generująca quiz na stronie
    function renderQuiz() {
        const form = document.getElementById('quizForm');
        document.getElementById('result').innerHTML = '';
        form.innerHTML = '';

        // Głęboka kopia, aby nie nadpisywać oryginalnej tablicy przy losowaniu
        let randomizedQuiz = JSON.parse(JSON.stringify(quizData));
        shuffleArray(randomizedQuiz); // Tasowanie pytań

        randomizedQuiz.forEach((q, index) => {
            const questionDiv = document.createElement('div');
            questionDiv.className = 'question';
            
            // Usunięto numerację z treści w bazie, aby dodać ją tutaj dynamicznie
            questionDiv.innerHTML = `<h3>${index + 1}. ${q.question}</h3>`;

            const optionsDiv = document.createElement('div');
            optionsDiv.className = 'options';

            shuffleArray(q.options); // Tasowanie odpowiedzi dla danego pytania

            q.options.forEach((opt) => {
                const label = document.createElement('label');
                // Atrybut value przetrzymuje informację, czy odpowiedź jest poprawna (true/false)
                label.innerHTML = `<input type="radio" name="q${index}" value="${opt.correct}"> ${opt.text}`;
                optionsDiv.appendChild(label);
            });

            questionDiv.appendChild(optionsDiv);
            form.appendChild(questionDiv);
        });

        // Tworzenie przycisku sprawdzania
        const submitBtn = document.createElement('button');
        submitBtn.type = 'button';
        submitBtn.className = 'btn';
        submitBtn.innerText = 'Sprawdź odpowiedzi';
        submitBtn.onclick = checkAnswers;
        form.appendChild(submitBtn);

        // Tworzenie przycisku resetu/losowania od nowa
        const reloadBtn = document.createElement('button');
        reloadBtn.type = 'button';
        reloadBtn.className = 'btn btn-reload';
        reloadBtn.innerText = 'Wylosuj pytania od nowa';
        reloadBtn.onclick = renderQuiz;
        form.appendChild(reloadBtn);
    }

    // Funkcja weryfikująca odpowiedzi
    function checkAnswers() {
        const questions = document.querySelectorAll('.question');
        let score = 0;

        questions.forEach((question) => {
            const options = question.querySelectorAll('input[type="radio"]');
            const labels = question.querySelectorAll('label');

            // Reset stylów w przypadku ponownego kliknięcia
            labels.forEach(label => {
                label.style.color = '#333';
                label.style.fontWeight = 'normal';
            });

            let selectedOption = null;

            options.forEach(opt => {
                if (opt.checked) selectedOption = opt;
                
                // Zawsze podświetl prawidłową odpowiedź
                if (opt.value === "true") {
                    opt.parentElement.style.color = '#27ae60';
                    opt.parentElement.style.fontWeight = 'bold';
                }
            });

            if (selectedOption) {
                if (selectedOption.value === "true") {
                    score++; // Prawidłowa odpowiedź
                } else {
                    // Błędna odpowiedź na czerwono
                    selectedOption.parentElement.style.color = '#e74c3c';
                }
            }
        });

        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = `Twój wynik to: <span class="${score > (quizData.length / 2) ? 'correct' : 'incorrect'}">${score} / ${quizData.length}</span>`;
        
        // Zablokuj przycisk sprawdzania po rozwiązaniu, aby wymusić reload
        document.querySelector('.btn').disabled = true;
        document.querySelector('.btn').style.opacity = '0.5';
        document.querySelector('.btn').style.cursor = 'not-allowed';
    }

    // Uruchomienie generowania na start
    window.onload = renderQuiz;
</script>

</body>
</html>
