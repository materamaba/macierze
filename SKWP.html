<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamiczny Quiz: Transformacje Geometryczne</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }
        .quiz-container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .question {
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        .question h3 {
            font-size: 1.1em;
            margin-bottom: 10px;
        }
        .options label {
            display: block;
            margin-bottom: 8px;
            cursor: pointer;
            padding: 8px;
            border-radius: 4px;
            transition: background 0.3s;
        }
        .options label:hover {
            background-color: #f0f0f0;
        }
        input[type="radio"] {
            margin-right: 10px;
        }
        .explanation {
            display: none;
            margin-top: 15px;
            padding: 15px;
            background-color: #e8f4f8;
            border-left: 4px solid #3498db;
            border-radius: 4px;
            font-size: 0.95em;
            color: #2c3e50;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #3498db;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 1.1em;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }
        .btn:hover {
            background-color: #2980b9;
        }
        .btn-reload {
            background-color: #7f8c8d;
            margin-top: 10px;
        }
        .btn-reload:hover {
            background-color: #95a5a6;
        }
        #result {
            margin-top: 20px;
            font-size: 1.2em;
            font-weight: bold;
            text-align: center;
        }
        .correct {
            color: #27ae60;
        }
        .incorrect {
            color: #e74c3c;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>Quiz: Transformacje i Grafika 3D</h1>
    <form id="quizForm"></form>
    <div id="result"></div>
</div>

<script>
    // Baza pytań, odpowiedzi i wyjaśnień
    const quizData = [
        {
            question: "W jakiej kolejności transformacji przeprowadzamy obrót punktu względem dowolnie wybranego innego punktu w przestrzeni 3D?",
            options: [
                { text: "stworzenie układu lokalnego współrzędnych o początku w środku obrotu, obrót zasadniczy i transformacje odwrotne", correct: false },
                { text: "stworzenie układu lokalnego współrzędnych o początku w środku obrotu, stworzenie drugiego lokalnego nakładającego odpowiednie osie, obrót zasadniczy i transformacje odwrotne", correct: true },
                { text: "wystarczy jedynie obrót", correct: false }
            ],
            explanation: "<b>Wyjaśnienie:</b> Aby poprawnie wykonać obrót względem dowolnego punktu w przestrzeni 3D i dowolnej osi, musimy najpierw przesunąć ten punkt do środka układu współrzędnych (translacja), nałożyć (dopasować) osie, wokół których chcemy obracać (rotacje dopasowujące), wykonać właściwy obrót zasadniczy, a na koniec odwrócić wszystkie poprzednie kroki w odwrotnej kolejności (transformacje odwrotne), by obiekt wrócił na swoje miejsce."
        },
        {
            question: "Macierz projekcji prostokątnej na płaszczyznę yz:",
            options: [
                { text: "ma wartość „-1” w pozycji 1,1 macierzy (wiersz kolumna)", correct: false },
                { text: "ma wartość „0” w pozycji 1,1 macierzy (wiersz kolumna)", correct: true },
                { text: "ma wartość „1” w pozycji 3,1 macierzy (wiersz kolumna)", correct: false }
            ],
            explanation: "<b>Wyjaśnienie:</b> Rzutowanie (projekcja) na płaszczyznę YZ polega na „wyzerowaniu” wymiaru X (pozbawieniu go głębi/wartości na tej osi). Dlatego w macierzy odpowiadającej za to przekształcenie, w wierszu 1 i kolumnie 1 (pozycja kontrolująca oś X) musi znajdować się 0."
        },
        {
            question: "W projekcji aksonometrycznej izometrycznej współczynnik skrótu względem osi wynosi:",
            options: [
                { text: "dla wszystkich osi 0.82", correct: true },
                { text: "dla osi x 0.47, osi y 0.94, osi z 0.94", correct: false },
                { text: "dla wszystkich osi 0.47", correct: false }
            ],
            explanation: "<b>Wyjaśnienie:</b> W rzucie izometrycznym (izometrii) kąty między osiami X, Y i Z są sobie równe (wynoszą 120 stopni). W związku z tym skrócenie perspektywiczne na wszystkich trzech osiach jest jednakowe i wynosi w przybliżeniu ok. 0.82 (dokładniej to pierwiastek z 2/3, czyli ok. 0.816)."
        },
        {
            question: "Macierz odbicia w płaszczyźnie y-z to macierz która:",
            options: [
                { text: "ma wartość „-1” w pozycji 1,1 macierzy (wiersz kolumna)", correct: true },
                { text: "ma wartość „-1” w pozycji 2,2 macierzy (wiersz kolumna)", correct: false },
                { text: "ma wartość „-1” w pozycji 3,1 macierzy (wiersz kolumna)", correct: false }
            ],
            explanation: "<b>Wyjaśnienie:</b> Odbicie lustrzane względem płaszczyzny YZ powoduje jedynie zmianę znaku na osi X (z dodatniego na ujemny i odwrotnie). Wynika z tego, że w macierzy transformacji współczynnik dla osi X (znajdujący się w komórce 1,1) musi zostać ustawiony na -1."
        },
        {
            question: "Jaki warunek musi być spełniony aby skalowanie było skalowaniem równomiernym:",
            options: [
                { text: "wszystkie liczby na diagonali musza być takie same", correct: false },
                { text: "na diagonali muszą znajdować się zera", correct: false },
                { text: "wszystkie współczynniki skalowania na diagonali musza być takie same", correct: true }
            ],
            explanation: "<b>Wyjaśnienie:</b> W macierzy transformacji wartości odpowiedzialne za skalowanie znajdują się na głównej przekątnej (diagonali) – np. pozycje (1,1), (2,2), (3,3). Skalowanie jest równomierne (jednorodne), gdy powiększamy/pomniejszamy obiekt proporcjonalnie w każdym kierunku o tę samą wartość."
        },
        {
            question: "W rzutowaniu perspektywicznym wszystkie promienie kształtujące rzut są do siebie:",
            options: [
                { text: "równoległe", correct: false },
                { text: "prostopadłe", correct: false },
                { text: "leżą pod różnym kątem w stosunku do środka rzutowania", correct: true }
            ],
            explanation: "<b>Wyjaśnienie:</b> Cechą charakterystyczną perspektywy (rzutowania perspektywicznego) jest to, że linie (promienie rzutujące) wychodzą z jednego punktu zbiegu (środka rzutowania / „oka” obserwatora). Zbiegają się one, co oznacza, że każdy z promieni pada na rzutnię pod innym kątem. Rzutowanie prostopadłe lub skośne to rzutowania równoległe."
        },
        {
            question: "Oblicz położenie po transformacji wierzchołków prostokąta A(3,0); B(6,0); C(3,2); D(6,2). Zastosuj przesunięcie o wektor [3,0].",
            options: [
                { text: "A (6,0) B (9,0) C (6,2) D (9,2)", correct: true },
                { text: "A (0,3) B (0,6) C (-2,3) D (-2,6)", correct: false },
                { text: "A(3,0); B(6,0); C(3,2); D(6,2)", correct: false }
            ],
            explanation: "<b>Wyjaśnienie:</b> Translacja (przesunięcie) o wektor [3,0] oznacza, że do każdej współrzędnej X dodajemy wartość 3, a do każdej współrzędnej Y dodajemy wartość 0. Wyliczenia: A(3+3, 0+0) = A(6,0); B(6+3, 0+0) = B(9,0) i tak dalej."
        },
        {
            question: "Oblicz położenie po transformacji wierzchołków trójkąta A(1,1); B(4,2); C(1,3). Zastosuj odbicie względem osi X.",
            options: [
                { text: "A (-1,-1) B (-4,-2) C (-1,-3)", correct: false },
                { text: "A (-1,1) B (-4,2) C (-1,3)", correct: false },
                { text: "A (1,-1) B (4,-2) C (1,-3)", correct: true }
            ],
            explanation: "<b>Wyjaśnienie:</b> Przy odbiciu punktu względem osi poziomej X, współrzędna X pozostaje bez zmian, a współrzędna Y zmienia znak na przeciwny. Obliczenia: dla punktu A(1, 1) będzie to A(1, -1); dla punktu B(4, 2) będzie to B(4, -2) itd."
        },
        {
            question: "Oblicz położenie po transformacji wierzchołków prostokąta A(3,0); B(6,0); C(3,2); D(6,2). Zastosuj obrót względem środka układu współrzędnych o kąt 90 stopni odwrotnie do ruchu wskazówek zegara.",
            options: [
                { text: "A (0,-3) B (0,-6) C (2,-3) D (2,-6)", correct: false },
                { text: "A (0,3) B (0,6) C (-2,3) D (-2,6)", correct: true },
                { text: "A(-3,0); B(-6,0); C(-3,2); D(-6,2)", correct: false },
                { text: "A(-3,0); B(-6,0); C(-3,-2); D(-6,-2)", correct: false }
            ],
            explanation: "<b>Wyjaśnienie:</b> Wzory na obrót o 90 stopni w lewo (odwrotnie do ruchu wskazówek zegara) dla punktu (x, y) to x' = -y, a y' = x. Obliczmy dla wierzchołka C(3, 2): nowa współrzędna X wynosi -2, a nowa Y wynosi 3, dając punkt C'(-2, 3)."
        },
        {
            question: "Czy dla transformacji geometrycznej (nie deformacji) każdy punkt ma swoją jedyną reprezentację w zbiorze przekształconym oraz wszystkie punkty w zbiorze przekształconym mają swoją reprezentację w zbiorze pierwotnym? Czy zawsze możliwe jest przekształcenie odwrotne?",
            options: [
                { text: "tak", correct: true },
                { text: "nie", correct: false }
            ],
            explanation: "<b>Wyjaśnienie:</b> Tak, standardowe transformacje afiniczne (translacja, rotacja, skalowanie - nie licząc ekstremum, czyli skalowania przez 0) oraz odbicie są tzw. transformacjami bijektywnymi. Można je cofnąć za pomocą odpowiedniej macierzy odwrotnej."
        }
    ];

    // Funkcja do tasowania tablicy
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    // Funkcja generująca quiz
    function renderQuiz() {
        const form = document.getElementById('quizForm');
        document.getElementById('result').innerHTML = '';
        form.innerHTML = '';

        let randomizedQuiz = JSON.parse(JSON.stringify(quizData));
        shuffleArray(randomizedQuiz);

        randomizedQuiz.forEach((q, index) => {
            const questionDiv = document.createElement('div');
            questionDiv.className = 'question';
            questionDiv.innerHTML = `<h3>${index + 1}. ${q.question}</h3>`;

            const optionsDiv = document.createElement('div');
            optionsDiv.className = 'options';

            shuffleArray(q.options);

            q.options.forEach((opt) => {
                const label = document.createElement('label');
                label.innerHTML = `<input type="radio" name="q${index}" value="${opt.correct}"> ${opt.text}`;
                optionsDiv.appendChild(label);
            });

            questionDiv.appendChild(optionsDiv);

            // Kontener na wyjaśnienie - ukryty domyślnie
            const explanationDiv = document.createElement('div');
            explanationDiv.className = 'explanation';
            explanationDiv.innerHTML = q.explanation;
            questionDiv.appendChild(explanationDiv);

            form.appendChild(questionDiv);
        });

        const submitBtn = document.createElement('button');
        submitBtn.type = 'button';
        submitBtn.className = 'btn';
        submitBtn.innerText = 'Sprawdź odpowiedzi';
        submitBtn.onclick = checkAnswers;
        form.appendChild(submitBtn);

        const reloadBtn = document.createElement('button');
        reloadBtn.type = 'button';
        reloadBtn.className = 'btn btn-reload';
        reloadBtn.innerText = 'Wylosuj pytania od nowa';
        reloadBtn.onclick = renderQuiz;
        form.appendChild(reloadBtn);
    }

    // Funkcja sprawdzająca
    function checkAnswers() {
        const questions = document.querySelectorAll('.question');
        let score = 0;

        questions.forEach((question) => {
            const options = question.querySelectorAll('input[type="radio"]');
            const labels = question.querySelectorAll('label');
            const explanation = question.querySelector('.explanation');

            labels.forEach(label => {
                label.style.color = '#333';
                label.style.fontWeight = 'normal';
                label.style.backgroundColor = 'transparent';
            });

            let selectedOption = null;

            options.forEach(opt => {
                if (opt.checked) selectedOption = opt;
                
                if (opt.value === "true") {
                    opt.parentElement.style.color = '#27ae60';
                    opt.parentElement.style.fontWeight = 'bold';
                    opt.parentElement.style.backgroundColor = '#eafaf1';
                }
            });

            if (selectedOption) {
                if (selectedOption.value === "true") {
                    score++;
                } else {
                    selectedOption.parentElement.style.color = '#e74c3c';
                    selectedOption.parentElement.style.backgroundColor = '#fceceb';
                }
            }

            // Pokaż wyjaśnienie po sprawdzeniu
            if (explanation) {
                explanation.style.display = 'block';
            }
        });

        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = `Twój wynik to: <span class="${score > (quizData.length / 2) ? 'correct' : 'incorrect'}">${score} / ${quizData.length}</span>`;
        
        document.querySelector('.btn').disabled = true;
        document.querySelector('.btn').style.opacity = '0.5';
        document.querySelector('.btn').style.cursor = 'not-allowed';
    }

    window.onload = renderQuiz;
</script>

</body>
</html>
